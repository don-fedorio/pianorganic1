{{ define "customCSS" }}
<style>
  #graph-wrap {
    width: 100%;
    height: 68vh;
    min-height: 440px;
    position: relative;
    background: #f6f8fb;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid #dde6ee;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    margin-bottom: 0.75rem;
  }

  #graph-svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #graph-svg:active { cursor: grabbing; }

  .g-link {
    stroke: #b8d4dc;
    stroke-width: 1.6px;
    stroke-linecap: round;
    transition: stroke 0.25s, opacity 0.25s, stroke-width 0.25s;
  }

  .g-link.link-hi {
    stroke: #00b8d4;
    stroke-width: 2.8px;
  }

  .g-link.link-dim { opacity: 0.07; }

  .g-node circle {
    fill: #ffffff;
    stroke: #00b8d4;
    stroke-width: 2.2px;
    cursor: pointer;
    transition: fill 0.2s, stroke-width 0.2s;
  }

  .g-node.node-hi circle {
    fill: #00b8d4;
    stroke: #007a8f;
    stroke-width: 2.5px;
  }

  .g-node.node-dim circle {
    fill: #f0f0f0;
    stroke: #ccc;
    opacity: 0.35;
  }

  .g-node.node-active circle {
    fill: #00b8d4;
    stroke: #007a8f;
    stroke-width: 3px;
  }

  .g-label {
    font-family: inherit;
    font-size: 10.5px;
    fill: #4a5568;
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.01em;
    transition: opacity 0.2s, fill 0.2s;
  }

  .g-node.node-hi .g-label,
  .g-node.node-active .g-label { fill: #005f6b; font-weight: 600; }
  .g-node.node-dim .g-label { opacity: 0.2; }

  /* ── preview card ─────────────────────────────────────────────────────── */
  #g-preview {
    position: absolute;
    width: 260px;
    max-width: calc(100% - 16px);
    background: rgba(255,255,255,0.98);
    border: 1px solid #cde4ea;
    border-radius: 14px;
    padding: 14px 18px 16px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }

  #g-preview.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #g-preview .preview-title {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: #00959f;
    text-decoration: none;
    margin-bottom: 6px;
    line-height: 1.35;
  }

  #g-preview .preview-title:hover {
    text-decoration: underline;
    color: #007a8f;
  }

  #g-preview .preview-desc {
    font-size: 13px;
    color: #666;
    margin: 0;
    line-height: 1.45;
  }

  #g-preview .preview-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #aaa;
    line-height: 1;
    padding: 2px 4px;
  }

  #g-preview .preview-close:hover { color: #555; }

  .graph-hint {
    font-size: 12px;
    color: #b0bec5;
    text-align: center;
    letter-spacing: 0.03em;
  }
</style>
{{ end }}

{{ define "main" }}
<div class="container">
  <div id="graph-wrap">
    <svg id="graph-svg">
      <defs>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
    </svg>
    <div id="g-preview">
      <button class="preview-close" aria-label="закрыть">×</button>
      <a class="preview-title" href=""></a>
      <p class="preview-desc"></p>
    </div>
  </div>
  <p class="graph-hint">Нажмите на узел — появится превью &nbsp;·&nbsp; Перетащите &nbsp;·&nbsp; Колёсиком — масштаб</p>
</div>
{{ end }}

{{ define "customScripts" }}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function () {
  "use strict";

  const NODES = [
    {
      id: "personazh",
      label: ["Персонаж"],
      url: "/blog/personazh/personazh/",
      desc: "Живая сущность подсознания и внутренний голос музыки"
    },
    {
      id: "mastery",
      label: ["Рождение", "мастерства"],
      url: "/blog/mastery/mastery/",
      desc: "Как рождается настоящее мастерство — изнутри, а не по правилам"
    },
    {
      id: "etude",
      label: ["Когда", "этюд поёт"],
      url: "/blog/etude/etude/",
      desc: "Этюд как путь и хроника преодоления"
    },
    {
      id: "authority",
      label: ["Не строй", "из себя знатока"],
      url: "/blog/authority/authority/",
      desc: "Подлинное знание без позы и давления"
    },
    {
      id: "sensei",
      label: ["Тот, кто шёл", "впереди"],
      url: "/blog/sensei/sensei/",
      desc: "Учитель, который сам прошёл путь через ошибки"
    },
    {
      id: "art-creativity",
      label: ["Где начинается", "творчество"],
      url: "/blog/art-creativity/art-creativity/",
      desc: "Граница между искусством и подлинным творчеством"
    },
    {
      id: "by-heart",
      label: ["Выучить", "наизусть"],
      url: "/blog/by-heart/by-heart/",
      desc: "Память как живой отклик, а не зубрёжка"
    },
    {
      id: "taktovaya-cherta",
      label: ["Природа", "тактовой черты"],
      url: "/blog/taktovaya-cherta/taktovaya-cherta/",
      desc: "Ритм как неотъемлемое свойство музыки и смысл тактовой черты"
    },
    {
      id: "odinakovye",
      label: ["Одинаковые:", "опыт самоанализа"],
      url: "/blog/odinakovye/odinakovye/",
      desc: "Хиральность, зеркальный портал и аппликатура как средство выразительности"
    },
    {
      id: "macdowell",
      label: ["МакДоуэлл и", "педагогика"],
      url: "/blog/macdowell/macdowell/",
      desc: "Эдвард МакДоуэлл — основоположник американской композиторской школы"
    },
    {
      id: "tupik",
      label: ["Творческий", "тупик"],
      url: "/blog/tupik/tupik/",
      desc: "Честный монолог о поиске новизны и академическом кризисе"
    }
  ];

  const LINKS = [
    // — исходные связи —
    { source: "personazh",        target: "mastery"           },
    { source: "personazh",        target: "by-heart"          },
    { source: "personazh",        target: "art-creativity"    },
    { source: "mastery",          target: "etude"             },
    { source: "mastery",          target: "art-creativity"    },
    { source: "sensei",           target: "authority"         },
    { source: "sensei",           target: "mastery"           },
    { source: "etude",            target: "by-heart"          },
    { source: "by-heart",         target: "art-creativity"    },
    // — новые связи —
    { source: "taktovaya-cherta", target: "by-heart"          },
    { source: "taktovaya-cherta", target: "etude"             },
    { source: "taktovaya-cherta", target: "odinakovye"        },
    { source: "odinakovye",       target: "personazh"         },
    { source: "odinakovye",       target: "art-creativity"    },
    { source: "odinakovye",       target: "mastery"           },
    { source: "macdowell",        target: "sensei"            },
    { source: "macdowell",        target: "tupik"             },
    { source: "tupik",            target: "personazh"         },
    { source: "tupik",            target: "mastery"           },
    { source: "tupik",            target: "art-creativity"    }
  ];

  const R       = 22;
  const LINE_H  = 13;

  const wrap    = document.getElementById("graph-wrap");
  const svgEl   = document.getElementById("graph-svg");
  const preview = document.getElementById("g-preview");
  const prevTitle = preview.querySelector(".preview-title");
  const prevDesc  = preview.querySelector(".preview-desc");
  const prevClose = preview.querySelector(".preview-close");
  const svg     = d3.select(svgEl);

  let W = wrap.clientWidth;
  let H = wrap.clientHeight;
  let activeId = null;

  // ── preview helpers ───────────────────────────────────────────────────────
  const PW = 260;
  const PH = 92; // estimated height

  function positionPreview(d) {
    const t  = d3.zoomTransform(svgEl);
    const nx = t.applyX(d.x);
    const ny = t.applyY(d.y);
    const gap = R * t.k + 12;

    // prefer right, fall back to left
    let px = nx + gap;
    if (px + PW > W - 8) px = nx - gap - PW;
    px = Math.max(8, px);

    // center vertically on node, clamp
    let py = ny - PH / 2;
    py = Math.max(8, Math.min(H - PH - 8, py));

    preview.style.left = px + "px";
    preview.style.top  = py + "px";
  }

  function showPreview(d) {
    prevTitle.textContent = d.label.join(" ");
    prevTitle.href = d.url;
    prevDesc.textContent = d.desc;
    positionPreview(d);
    preview.classList.add("visible");
    activeId = d.id;
  }

  function hidePreview() {
    preview.classList.remove("visible");
    activeId = null;
    nodeSel.classed("node-active node-dim", false);
    linkSel.classed("link-hi link-dim", false);
  }

  prevClose.addEventListener("click", (ev) => {
    ev.stopPropagation();
    hidePreview();
  });

  // ── zoom / pan ────────────────────────────────────────────────────────────
  const root = svg.append("g").attr("class", "zoom-root");

  svg.call(
    d3.zoom()
      .scaleExtent([0.3, 4])
      .on("zoom", (ev) => root.attr("transform", ev.transform))
  );

  // click on background closes preview
  svg.on("click", () => hidePreview());

  // ── simulation ────────────────────────────────────────────────────────────
  const sim = d3.forceSimulation(NODES)
    .force("link",    d3.forceLink(LINKS).id(d => d.id).distance(170).strength(0.42))
    .force("charge",  d3.forceManyBody().strength(-520))
    .force("center",  d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide(R + 46))
    .alphaDecay(0.022)
    .velocityDecay(0.38);

  // ── links ─────────────────────────────────────────────────────────────────
  const linkSel = root.append("g")
    .selectAll("line")
    .data(LINKS)
    .join("line")
    .attr("class", "g-link")
    .style("opacity", 0);

  // ── nodes ─────────────────────────────────────────────────────────────────
  const nodeSel = root.append("g")
    .selectAll("g")
    .data(NODES)
    .join("g")
    .attr("class", "g-node")
    .style("opacity", 0)
    .call(
      d3.drag()
        .on("start", (ev, d) => {
          if (!ev.active) sim.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end",  (ev, d) => {
          if (!ev.active) sim.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
    );

  nodeSel.append("circle").attr("r", R);

  // multi-line labels below circle
  nodeSel.each(function (d) {
    const g = d3.select(this);
    d.label.forEach((line, i) => {
      g.append("text")
        .attr("class", "g-label")
        .attr("y", R + 10 + i * LINE_H + (d.label.length === 1 ? LINE_H / 2 : 0))
        .text(line);
    });
  });

  // fade-in
  setTimeout(() => {
    nodeSel.transition().duration(700).style("opacity", 1);
    linkSel.transition().duration(700).style("opacity", 1);
  }, 250);

  // ── neighbour lookup ──────────────────────────────────────────────────────
  function getNeighbours(d) {
    const ids = new Set([d.id]);
    LINKS.forEach(l => {
      if (l.source.id === d.id) ids.add(l.target.id);
      if (l.target.id === d.id) ids.add(l.source.id);
    });
    return ids;
  }

  function applyHighlight(d) {
    const nb = getNeighbours(d);
    nodeSel
      .classed("node-active", n => n.id === d.id)
      .classed("node-dim",    n => !nb.has(n.id))
      .classed("node-hi",     false);
    linkSel
      .classed("link-hi",  l => l.source.id === d.id || l.target.id === d.id)
      .classed("link-dim", l => l.source.id !== d.id && l.target.id !== d.id);
    d3.selectAll(".g-node.node-active circle").attr("filter", "url(#glow)");
    d3.selectAll(".g-node:not(.node-active) circle").attr("filter", null);
  }

  // ── hover (desktop only) ──────────────────────────────────────────────────
  nodeSel
    .on("mouseenter", function (ev, d) {
      if (activeId) return; // preview open — don't change highlight
      const nb = getNeighbours(d);
      nodeSel
        .classed("node-hi",  n => n.id === d.id)
        .classed("node-dim", n => !nb.has(n.id));
      linkSel
        .classed("link-hi",  l => l.source.id === d.id || l.target.id === d.id)
        .classed("link-dim", l => l.source.id !== d.id && l.target.id !== d.id);
    })
    .on("mouseleave", function () {
      if (activeId) return;
      nodeSel.classed("node-hi node-dim", false);
      linkSel.classed("link-hi link-dim", false);
    });

  // ── click / tap ───────────────────────────────────────────────────────────
  nodeSel.on("click", function (ev, d) {
    ev.stopPropagation();
    if (activeId === d.id) {
      hidePreview();
      return;
    }
    applyHighlight(d);
    showPreview(d);
  });

  // ── tick ──────────────────────────────────────────────────────────────────
  sim.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // ── resize ────────────────────────────────────────────────────────────────
  new ResizeObserver(() => {
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    sim.force("center", d3.forceCenter(W / 2, H / 2)).alpha(0.25).restart();
  }).observe(wrap);

}());
</script>
{{ end }}
